<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSS Leaderboard 728x90 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 728px;
    height: 90px;
    overflow: hidden;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a.banner {
    display: flex;
    align-items: center;
    width: 728px;
    height: 90px;
    background: #0D1B2A;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  /* Orange top bar — hard to miss */
  a.banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: #FF5F1F;
    z-index: 10;
  }

  /* Diagonal slash accent — right side */
  .slash {
    position: absolute;
    right: 210px;
    top: 0;
    bottom: 0;
    width: 60px;
    background: linear-gradient(105deg, transparent 40%, rgba(255,95,31,0.08) 40%);
    pointer-events: none;
  }

  /* Subtle diagonal stripe texture on far right */
  .bg-texture {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 250px;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 8px,
      rgba(255,95,31,0.04) 8px,
      rgba(255,95,31,0.04) 10px
    );
    pointer-events: none;
  }

  /* Brand zone */
  .brand {
    flex: 0 0 auto;
    padding: 0 0 0 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    line-height: 1;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .brand-name em {
    font-style: normal;
    color: #FF5F1F;
  }
  .brand-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 8.5px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
    white-space: nowrap;
  }

  /* Divider */
  .sep {
    flex: 0 0 auto;
    width: 1px;
    height: 44px;
    background: rgba(255,95,31,0.3);
    margin: 0 22px;
    position: relative;
    z-index: 2;
  }

  /* Headline zone */
  .headline {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .headline-main {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 30px;
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .headline-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    line-height: 1;
    margin-top: 5px;
    white-space: nowrap;
  }
  .headline-sub strong {
    color: #FF5F1F;
    font-weight: 700;
  }

  /* CTA zone */
  .cta-wrap {
    flex: 0 0 auto;
    padding: 0 22px;
    position: relative;
    z-index: 2;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #FF5F1F;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 13px 20px;
    border-radius: 4px;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(255,95,31,0.45), 0 2px 8px rgba(0,0,0,0.4);
  }
  .cta-arrow {
    font-size: 14px;
    line-height: 1;
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="bg-texture"></div>
  <div class="slash"></div>
  <div class="brand">
    <div class="brand-name">Quick <em>Short</em> Sales</div>
    <div class="brand-sub">South Florida</div>
  </div>
  <div class="sep"></div>
  <div class="headline">
    <div class="headline-main">Struggling with payments?</div>
    <div class="headline-sub">You have options. <strong>A short sale may be your way out.</strong></div>
  </div>
  <div class="cta-wrap">
    <div class="cta-btn">Free Consultation <span class="cta-arrow">→</span></div>
  </div>
</a>
</body>
</html>
