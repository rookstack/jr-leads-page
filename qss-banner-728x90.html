<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 728px;
    height: 90px;
    overflow: hidden;
    font-family: 'Arial Black', 'Impact', sans-serif;
  }

  .banner {
    width: 728px;
    height: 90px;
    position: relative;
    overflow: hidden;
    background: #0d0020;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    cursor: pointer;
  }

  /* Animated gradient sweep background */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 300%;
    height: 100%;
    background: linear-gradient(
      105deg,
      #0d0020 0%,
      #1a003a 15%,
      #39FF14 30%,
      #1a003a 45%,
      #FF10F0 60%,
      #0d0020 75%,
      #39FF14 90%,
      #0d0020 100%
    );
    opacity: 0.18;
    animation: sweep 4s linear infinite;
  }

  @keyframes sweep {
    0%   { left: -100%; }
    100% { left: 0%; }
  }

  /* Neon top/bottom border lines */
  .banner::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-top: 2px solid #39FF14;
    border-bottom: 2px solid #FF10F0;
    pointer-events: none;
    animation: borderGlow 2s ease-in-out infinite alternate;
  }

  @keyframes borderGlow {
    0%   { box-shadow: inset 0 2px 8px #39FF14, inset 0 -2px 8px #FF10F0; }
    100% { box-shadow: inset 0 2px 16px #39FF14aa, inset 0 -2px 16px #FF10F0aa; }
  }

  .text-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  .headline {
    font-size: 22px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px #39FF14, 0 0 20px #39FF14aa;
    line-height: 1.1;
  }

  .headline span {
    color: #39FF14;
  }

  .sub {
    font-size: 13px;
    font-weight: 700;
    color: #FF10F0;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 8px #FF10F0;
    margin-top: 2px;
  }

  .cta-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .cta-btn {
    background: linear-gradient(135deg, #39FF14, #00ff88);
    color: #0d0020;
    font-size: 14px;
    font-weight: 900;
    padding: 10px 22px;
    border: none;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    position: relative;
    animation: btnPulse 1.5s ease-in-out infinite;
    white-space: nowrap;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  @keyframes btnPulse {
    0%   { box-shadow: 0 0 8px #39FF14, 0 0 20px #39FF14aa, 0 0 40px #39FF1455; }
    50%  { box-shadow: 0 0 16px #39FF14, 0 0 35px #39FF14cc, 0 0 60px #39FF1477; }
    100% { box-shadow: 0 0 8px #39FF14, 0 0 20px #39FF14aa, 0 0 40px #39FF1455; }
  }

  .phone {
    font-size: 15px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #FF10F0, 0 0 20px #FF10F0aa;
  }

  /* Diagonal speed lines */
  .lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .line {
    position: absolute;
    width: 1px;
    height: 200%;
    top: -50%;
    background: linear-gradient(to bottom, transparent, #39FF1433, transparent);
    animation: lineMove 3s linear infinite;
  }

  .line:nth-child(1) { left: 15%;  animation-delay: 0s;    animation-duration: 2.5s; }
  .line:nth-child(2) { left: 30%;  animation-delay: 0.8s;  animation-duration: 3s;   }
  .line:nth-child(3) { left: 50%;  animation-delay: 1.5s;  animation-duration: 2s;   background: linear-gradient(to bottom, transparent, #FF10F033, transparent); }
  .line:nth-child(4) { left: 65%;  animation-delay: 0.4s;  animation-duration: 3.5s; }
  .line:nth-child(5) { left: 80%;  animation-delay: 1.2s;  animation-duration: 2.8s; background: linear-gradient(to bottom, transparent, #FF10F033, transparent); }

  @keyframes lineMove {
    0%   { transform: rotate(20deg) translateY(-20%); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: rotate(20deg) translateY(100%); opacity: 0; }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>
  <div class="text-block">
    <div class="headline">Struggling with <span>payments?</span></div>
    <div class="sub">⚡ You Have Options — Act Now</div>
  </div>
  <div class="cta-block">
    <a class="cta-btn">GET FREE HELP NOW</a>
    <div class="phone">📞 (855) 204-4447</div>
  </div>
</div>
</body>
</html>
