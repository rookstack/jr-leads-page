<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>QSS Banner 728x90</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 728px; height: 90px; overflow: hidden; }
    .banner {
      width: 728px; height: 90px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .banner-body {
      height: 75px;
      background: #1a3a5c;
      display: flex; align-items: center;
      padding: 0 20px; gap: 16px;
      position: relative; overflow: hidden;
    }
    .banner-body::before {
      content: '';
      position: absolute; top: -30px; left: -30px;
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 12px solid rgba(201,148,74,0.07);
      pointer-events: none;
    }
    .b-left { display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; }
    .b-brand { font-family: 'Playfair Display', serif; font-size: 13px; color: #c9944a; letter-spacing: 0.04em; line-height: 1; margin-bottom: 2px; }
    .b-sub { font-family: 'Lato', sans-serif; font-size: 7.5px; color: rgba(245,240,232,0.5); letter-spacing: 0.12em; text-transform: uppercase; }
    .b-divider { width: 1px; height: 40px; background: rgba(201,148,74,0.2); flex-shrink: 0; }
    .b-headline { flex: 1; }
    .b-headline .h1 { font-family: 'Playfair Display', serif; font-size: 17px; color: #f5f0e8; line-height: 1.15; margin-bottom: 2px; }
    .b-headline .h2 { font-family: 'Lato', sans-serif; font-size: 9px; color: rgba(245,240,232,0.65); letter-spacing: 0.04em; }
    .b-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .b-phone { font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; color: #c9944a; }
    .b-cta { background: #c9944a; color: #1a3a5c; font-family: 'Lato', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 14px; }
    .compliance {
      background: #0a1929; border-top: 1px solid rgba(201,148,74,0.15);
      height: 15px; display: flex; align-items: center; padding: 0 6px; gap: 4px;
    }
    .compliance svg { height: 10px; width: auto; display: block; flex-shrink: 0; }
    .legal { font-family: 'Lato', sans-serif; font-size: 7px; color: rgba(180,190,200,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
<div class="banner">
  <div class="banner-body">
    <div class="b-left">
      <div class="b-brand">Quick Short Sales</div>
      <div class="b-sub">quickshortsales.net</div>
    </div>
    <div class="b-divider"></div>
    <div class="b-headline">
      <div class="h1">Need to Sell Your Home Fast?</div>
      <div class="h2">No repairs. No fees. Close in as little as 7 days.</div>
    </div>
    <div class="b-right">
      <div class="b-phone">(855) 204-4447</div>
      <div class="b-cta">Get My Offer</div>
    </div>
  </div>
  <div class="compliance">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" aria-label="Equal Housing Opportunity">
      <path d="M10 2L2 9h2v8h4v-5h4v5h4V9h2L10 2z" fill="none" stroke="rgba(180,190,200,0.55)" stroke-width="1.4" stroke-linejoin="round"/>
      <line x1="6" y1="13" x2="14" y2="13" stroke="rgba(180,190,200,0.55)" stroke-width="1.2"/>
      <line x1="6" y1="15.5" x2="14" y2="15.5" stroke="rgba(180,190,200,0.55)" stroke-width="1.2"/>
    </svg>
    <div class="legal">Jack Watlington PA dba Fidelity Realty Advisors &nbsp;|&nbsp; FL Lic. #3139881 &nbsp;|&nbsp; Equal Housing Opportunity</div>
  </div>
</div>
</body>
</html>
