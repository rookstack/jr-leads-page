<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 336px;
    height: 280px;
    overflow: hidden;
    font-family: 'Arial Black', 'Arial', sans-serif;
  }

  .banner {
    width: 336px;
    height: 280px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #00CFFF 0%, #00A8E8 45%, #007EC6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    cursor: pointer;
  }

  /* Yellow rotated square — top-right */
  .geo-tr {
    position: absolute;
    top: -45px;
    right: -35px;
    width: 130px;
    height: 130px;
    background: #FFD700;
    transform: rotate(45deg);
    opacity: 0.18;
  }

  /* Lime rotated square — bottom-left */
  .geo-bl {
    position: absolute;
    bottom: -40px;
    left: -25px;
    width: 110px;
    height: 110px;
    background: #32CD32;
    transform: rotate(45deg);
    opacity: 0.16;
  }

  /* Yellow accent — slim diagonal stripe mid */
  .geo-mid {
    position: absolute;
    top: 30%;
    right: -10px;
    width: 8px;
    height: 60px;
    background: #FFD700;
    transform: skewY(-25deg);
    opacity: 0.5;
    border-radius: 2px;
  }

  /* Yellow top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 5px;
    background: linear-gradient(90deg, #FFD700, #FFEB3B, #FFD700);
  }

  /* Lime bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 5px;
    background: linear-gradient(90deg, #32CD32, #66FF33, #32CD32);
    background-size: 200% 100%;
    animation: shimmer 2.5s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 22px;
    gap: 12px;
  }

  .badge {
    background: #FFD700;
    color: #007EC6;
    font-size: 10px;
    font-weight: 900;
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .headline {
    font-size: 28px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    text-shadow: 0 2px 5px rgba(0,0,0,0.18);
  }

  .headline .accent {
    color: #FFD700;
    display: block;
    font-size: 32px;
    line-height: 1.05;
  }

  .subtext {
    font-size: 14px;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .divider {
    width: 75%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    border-radius: 2px;
  }

  .cta-btn {
    background: #32CD32;
    color: #FFFFFF;
    font-size: 15px;
    font-weight: 900;
    padding: 14px 0;
    border: none;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    cursor: pointer;
    width: 100%;
    text-decoration: none;
    display: block;
    text-align: center;
    box-shadow: 0 4px 14px rgba(50,205,50,0.5);
    animation: btnBounce 2s ease-in-out infinite;
  }

  @keyframes btnBounce {
    0%, 100% { transform: scale(1);    box-shadow: 0 4px 14px rgba(50,205,50,0.5); }
    50%       { transform: scale(1.03); box-shadow: 0 6px 22px rgba(50,205,50,0.65); }
  }

  .phone {
    font-size: 17px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="geo-tr"></div>
  <div class="geo-bl"></div>
  <div class="geo-mid"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <div class="content">
    <div class="badge">✦ Free Consultation</div>
    <div class="headline">
      Struggling with
      <span class="accent">Payments?</span>
    </div>
    <div class="subtext">You Have Options</div>
    <div class="divider"></div>
    <a class="cta-btn">GET FREE HELP NOW</a>
    <div class="phone">📞 (855) 204-4447</div>
  </div>
</div>
</body>
</html>
