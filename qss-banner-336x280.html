<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSS Large Rectangle 336x280</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 336px;
    height: 280px;
    overflow: hidden;
    background: transparent;
  }
  a.banner {
    display: block;
    width: 336px;
    height: 280px;
    background: linear-gradient(160deg, #1a3a5c 0%, #0f2540 55%, #132d4a 100%);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  /* Gold left border strip */
  a.banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, #e6c76a 0%, #c9944a 100%);
  }

  /* Geometric gold arc — large, bottom-right */
  .arc-outer {
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,148,74,0.18);
    pointer-events: none;
  }
  .arc-inner {
    position: absolute;
    bottom: -40px;
    right: -40px;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 1px solid rgba(201,148,74,0.12);
    pointer-events: none;
  }
  /* Subtle dot grid texture */
  .texture {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(201,148,74,0.06) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  /* Top gold accent bar */
  .top-bar {
    position: absolute;
    top: 0; left: 5px; right: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(230,199,106,0.6) 0%, transparent 80%);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    padding: 34px 26px 28px 26px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .upper {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .eyebrow {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c9944a;
    margin-bottom: 12px;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.15;
    color: #f5f0e8;
    letter-spacing: -0.3px;
  }
  .headline span {
    color: #e6c76a;
  }
  .supporting {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: rgba(245,240,232,0.72);
    line-height: 1.5;
    margin-top: 14px;
  }
  .lower {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: rgba(201,148,74,0.45);
  }
  .cta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #c9944a 0%, #e6c76a 100%);
    color: #1a3a5c;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 3px;
    box-shadow: 0 4px 14px rgba(201,148,74,0.4);
  }
  .domain {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 9px;
    color: rgba(245,240,232,0.35);
    letter-spacing: 0.5px;
  }
  .brand-lockup {
    position: absolute;
    bottom: 16px;
    right: 22px;
    text-align: right;
    z-index: 3;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 10px;
    color: rgba(230,199,106,0.5);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="texture"></div>
  <div class="arc-outer"></div>
  <div class="arc-inner"></div>
  <div class="top-bar"></div>
  <div class="content">
    <div class="upper">
      <div class="eyebrow">South Florida Short Sale Specialists</div>
      <div class="headline">Avoid foreclosure.<br><span>Keep your dignity.</span></div>
      <div class="supporting">You may have more options than you think — even if you're behind on payments or underwater.</div>
    </div>
    <div class="lower">
      <div class="divider"></div>
      <div class="cta-row">
        <div class="cta-btn">Free Consultation</div>
        <div class="domain">quickshortsales.net</div>
      </div>
    </div>
  </div>
</a>
</body>
</html>
