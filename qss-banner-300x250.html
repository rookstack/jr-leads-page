<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSS Medium Rectangle 300x250</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 300px;
    height: 250px;
    overflow: hidden;
    background: transparent;
  }
  a.banner {
    display: block;
    width: 300px;
    height: 250px;
    background: linear-gradient(160deg, #1a3a5c 0%, #0e2338 55%, #132d4a 100%);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  /* Gold left border */
  a.banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, #e6c76a 0%, #c9944a 100%);
  }

  /* Geometric arcs — bottom-right */
  .arc-outer {
    position: absolute;
    bottom: -70px;
    right: -70px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,148,74,0.16);
    pointer-events: none;
  }
  .arc-inner {
    position: absolute;
    bottom: -35px;
    right: -35px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(201,148,74,0.1);
    pointer-events: none;
  }

  /* Subtle dot grid */
  .texture {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(201,148,74,0.055) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
  }

  /* Top gold accent line */
  .top-bar {
    position: absolute;
    top: 0; left: 5px; right: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(230,199,106,0.55) 0%, transparent 75%);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    padding: 28px 22px 24px 22px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .upper {
    display: flex;
    flex-direction: column;
  }
  .eyebrow {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 8.5px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: #c9944a;
    margin-bottom: 10px;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 1.18;
    color: #f5f0e8;
    letter-spacing: -0.3px;
  }
  .headline span {
    color: #e6c76a;
  }
  .supporting {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: rgba(245,240,232,0.68);
    line-height: 1.5;
    margin-top: 12px;
  }
  .lower {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .divider {
    width: 36px;
    height: 1px;
    background: rgba(201,148,74,0.4);
  }
  .cta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #c9944a 0%, #e6c76a 100%);
    color: #1a3a5c;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 10.5px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    padding: 10px 17px;
    border-radius: 3px;
    box-shadow: 0 3px 12px rgba(201,148,74,0.38);
  }
  .domain {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 8.5px;
    color: rgba(245,240,232,0.32);
    letter-spacing: 0.4px;
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="texture"></div>
  <div class="arc-outer"></div>
  <div class="arc-inner"></div>
  <div class="top-bar"></div>
  <div class="content">
    <div class="upper">
      <div class="eyebrow">Short Sale Specialists · South FL</div>
      <div class="headline">Struggling with payments?<br><span>You have options.</span></div>
      <div class="supporting">A short sale may let you walk away clean — no foreclosure, no judgment.</div>
    </div>
    <div class="lower">
      <div class="divider"></div>
      <div class="cta-row">
        <div class="cta-btn">Free Consultation</div>
        <div class="domain">quickshortsales.net</div>
      </div>
    </div>
  </div>
</a>
</body>
</html>
