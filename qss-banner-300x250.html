<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    height: 250px;
    overflow: hidden;
    font-family: 'Arial Black', 'Impact', sans-serif;
  }

  .banner {
    width: 300px;
    height: 250px;
    position: relative;
    overflow: hidden;
    background: #0d0020;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 0;
  }

  /* Animated diagonal gradient stripes */
  .stripes {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      -55deg,
      transparent 0px,
      transparent 18px,
      #39FF1408 18px,
      #39FF1408 20px,
      transparent 20px,
      transparent 38px,
      #FF10F008 38px,
      #FF10F008 40px
    );
    animation: stripesMove 4s linear infinite;
  }

  @keyframes stripesMove {
    0%   { background-position: 0 0; }
    100% { background-position: 80px 80px; }
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    animation: orbFloat 4s ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 180px;
    height: 180px;
    background: #39FF14;
    top: -60px;
    right: -40px;
    opacity: 0.12;
  }

  .orb-2 {
    width: 160px;
    height: 160px;
    background: #FF10F0;
    bottom: -50px;
    left: -30px;
    opacity: 0.14;
    animation-delay: -2s;
  }

  @keyframes orbFloat {
    0%   { transform: scale(0.8); opacity: 0.1; }
    100% { transform: scale(1.3); opacity: 0.18; }
  }

  /* Neon border with corners */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    z-index: 3;
  }

  .corner-tl { top: 6px; left: 6px;
    border-top: 3px solid #39FF14;
    border-left: 3px solid #39FF14;
    box-shadow: -2px -2px 8px #39FF14;
  }
  .corner-tr { top: 6px; right: 6px;
    border-top: 3px solid #FF10F0;
    border-right: 3px solid #FF10F0;
    box-shadow: 2px -2px 8px #FF10F0;
  }
  .corner-bl { bottom: 6px; left: 6px;
    border-bottom: 3px solid #FF10F0;
    border-left: 3px solid #FF10F0;
    box-shadow: -2px 2px 8px #FF10F0;
  }
  .corner-br { bottom: 6px; right: 6px;
    border-bottom: 3px solid #39FF14;
    border-right: 3px solid #39FF14;
    box-shadow: 2px 2px 8px #39FF14;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 18px;
    gap: 10px;
  }

  .eyebrow {
    font-size: 9px;
    font-weight: 900;
    color: #0d0020;
    background: linear-gradient(90deg, #39FF14, #FF10F0);
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .headline {
    font-size: 26px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    text-shadow: 0 0 14px #39FF14, 0 0 28px #39FF1466;
  }

  .headline .highlight {
    color: #39FF14;
    display: block;
    font-size: 30px;
    text-shadow: 0 0 18px #39FF14, 0 0 36px #39FF14aa;
    animation: textPulse 2s ease-in-out infinite alternate;
  }

  @keyframes textPulse {
    0%   { text-shadow: 0 0 10px #39FF14, 0 0 20px #39FF14aa; }
    100% { text-shadow: 0 0 20px #39FF14, 0 0 40px #39FF14cc, 0 0 60px #39FF1455; }
  }

  .options-text {
    font-size: 14px;
    font-weight: 700;
    color: #FF10F0;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px #FF10F0, 0 0 20px #FF10F077;
  }

  .divider {
    width: 75%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #39FF14, #FF10F0, transparent);
  }

  .cta-btn {
    background: linear-gradient(135deg, #39FF14, #00ff88);
    color: #0d0020;
    font-size: 14px;
    font-weight: 900;
    padding: 12px 0;
    border: none;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    cursor: pointer;
    width: 100%;
    animation: btnPulse 1.4s ease-in-out infinite;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  @keyframes btnPulse {
    0%   { box-shadow: 0 0 10px #39FF14, 0 0 25px #39FF14bb, 0 0 50px #39FF1455; }
    50%  { box-shadow: 0 0 20px #39FF14, 0 0 50px #39FF14dd, 0 0 90px #39FF1477; }
    100% { box-shadow: 0 0 10px #39FF14, 0 0 25px #39FF14bb, 0 0 50px #39FF1455; }
  }

  .phone {
    font-size: 16px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #FF10F0, 0 0 20px #FF10F0aa;
  }

  /* Scanline overlay */
  .scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 4;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="stripes"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="scanlines"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="eyebrow">⚡ Free Consultation</div>
    <div class="headline">
      Struggling with
      <span class="highlight">Payments?</span>
    </div>
    <div class="options-text">You Have Options</div>
    <div class="divider"></div>
    <a class="cta-btn">GET FREE HELP NOW</a>
    <div class="phone">📞 (855) 204-4447</div>
  </div>
</div>
</body>
</html>
