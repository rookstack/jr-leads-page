<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    height: 250px;
    overflow: hidden;
    font-family: 'Arial Black', 'Arial', sans-serif;
  }

  .banner {
    width: 300px;
    height: 250px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #00CFFF 0%, #00A8E8 45%, #007EC6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* Yellow diagonal stripe — top-right corner accent */
  .stripe-tl {
    position: absolute;
    top: -40px;
    right: -30px;
    width: 120px;
    height: 120px;
    background: #FFD700;
    transform: rotate(45deg);
    opacity: 0.18;
  }

  /* Lime geometric shape — bottom-left */
  .stripe-br {
    position: absolute;
    bottom: -30px;
    left: -20px;
    width: 100px;
    height: 100px;
    background: #32CD32;
    transform: rotate(45deg);
    opacity: 0.16;
  }

  /* Slim yellow top bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 5px;
    background: linear-gradient(90deg, #FFD700, #FFEB3B, #FFD700);
  }

  /* Lime green bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 5px;
    background: linear-gradient(90deg, #32CD32, #66FF33, #32CD32);
    background-size: 200% 100%;
    animation: shimmer 2.5s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 20px;
    gap: 11px;
  }

  .eyebrow {
    font-size: 9.5px;
    font-weight: 900;
    color: #007EC6;
    background: #FFD700;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }

  .headline {
    font-size: 26px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.18);
  }

  .headline .highlight {
    color: #FFD700;
    display: block;
    font-size: 30px;
    line-height: 1.05;
  }

  .options-text {
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .divider {
    width: 70%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    border-radius: 2px;
  }

  .cta-btn {
    background: #32CD32;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 900;
    padding: 13px 0;
    border: none;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    width: 100%;
    text-decoration: none;
    display: block;
    text-align: center;
    box-shadow: 0 4px 14px rgba(50,205,50,0.5);
    animation: btnBounce 2s ease-in-out infinite;
  }

  @keyframes btnBounce {
    0%, 100% { transform: scale(1);    box-shadow: 0 4px 14px rgba(50,205,50,0.5); }
    50%       { transform: scale(1.03); box-shadow: 0 6px 20px rgba(50,205,50,0.65); }
  }

  .phone {
    font-size: 16px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 0.8px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="stripe-tl"></div>
  <div class="stripe-br"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <div class="content">
    <div class="eyebrow">✦ Free Consultation</div>
    <div class="headline">
      Struggling with
      <span class="highlight">Payments?</span>
    </div>
    <div class="options-text">You Have Options</div>
    <div class="divider"></div>
    <a class="cta-btn">GET FREE HELP NOW</a>
    <div class="phone">📞 (855) 204-4447</div>
  </div>
</div>
</body>
</html>
