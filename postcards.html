<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QSS Postcard Previews</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #f5f5f5; padding: 40px 24px; }
    h1 { font-size: 1.2rem; letter-spacing: 0.1em; text-transform: uppercase; color: #c9944a; margin-bottom: 32px; }
    .cards { display: flex; flex-direction: column; gap: 48px; }
    .card { }
    .label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.12em; color: #888; margin-bottom: 12px; }
    .label strong { color: #c9944a; }
    .frames { display: flex; gap: 20px; flex-wrap: wrap; }
    iframe { border: 1px solid #333; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Quick Short Sales — Postcard Previews</h1>
  <div class="cards">
    <div class="card">
      <div class="label"><strong>Stage 1</strong> — First Touch (Month 1) · "Behind on payments? You still have options."</div>
      <div class="frames">
        <div>
          <div style="font-size:0.7rem;color:#666;margin-bottom:4px;">FRONT</div>
          <iframe src="postcard-stage1.html" width="750" height="540" scrolling="no"></iframe>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="label"><strong>Stage 2</strong> — Second Touch (Month 2) · "Avoid foreclosure. Protect your future."</div>
      <div class="frames">
        <div>
          <div style="font-size:0.7rem;color:#666;margin-bottom:4px;">FRONT</div>
          <iframe src="postcard-stage2.html" width="750" height="540" scrolling="no"></iframe>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="label"><strong>Stage 3</strong> — Final Touch (Month 3) · "It's not too late — but timing matters."</div>
      <div class="frames">
        <div>
          <div style="font-size:0.7rem;color:#666;margin-bottom:4px;">FRONT</div>
          <iframe src="postcard-stage3.html" width="750" height="540" scrolling="no"></iframe>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
