<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QSS Mobile Banner 320x50</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 320px; height: 50px; overflow: hidden; background: transparent; }
  a.banner {
    display: flex;
    align-items: center;
    width: 320px;
    height: 50px;
    background: linear-gradient(105deg, #1a3a5c 0%, #0f2540 100%);
    border-left: 4px solid #c9944a;
    text-decoration: none;
    overflow: hidden;
    cursor: pointer;
  }
  .brand {
    flex: 0 0 48px;
    padding: 0 8px;
    border-right: 1px solid rgba(201,148,74,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 9.5px;
    color: #e6c76a;
    white-space: nowrap;
    line-height: 1;
  }
  .headline {
    flex: 1;
    min-width: 0;
    padding: 0 8px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .headline-text {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: #f5f0e8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .headline-text em { font-style: normal; color: #e6c76a; }
  .cta-wrap {
    flex: 0 0 auto;
    padding: 0 8px;
  }
  .cta-btn {
    display: block;
    background: linear-gradient(135deg, #c9944a, #e6c76a);
    color: #1a3a5c;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 8.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 7px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="brand">
    <div class="brand-name">QSS</div>
  </div>
  <div class="headline">
    <div class="headline-text">Struggling with payments? <em>You have options.</em></div>
  </div>
  <div class="cta-wrap">
    <div class="cta-btn">Get Help</div>
  </div>
</a>
</body>
</html>
