<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 320px;
    height: 50px;
    overflow: hidden;
    font-family: 'Arial Black', 'Impact', sans-serif;
  }

  .banner {
    width: 320px;
    height: 50px;
    position: relative;
    overflow: hidden;
    background: #0d0020;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    cursor: pointer;
  }

  /* Animated gradient sweep */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 300%;
    height: 100%;
    background: linear-gradient(
      105deg,
      #0d0020 0%,
      #39FF14 25%,
      #0d0020 40%,
      #FF10F0 60%,
      #0d0020 75%,
      #39FF14 90%
    );
    opacity: 0.15;
    animation: sweep 3s linear infinite;
  }

  @keyframes sweep {
    0%   { left: -100%; }
    100% { left: 0%; }
  }

  .banner::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-top: 2px solid #39FF14;
    border-bottom: 2px solid #FF10F0;
    pointer-events: none;
  }

  .text-block {
    position: relative;
    z-index: 2;
  }

  .headline {
    font-size: 13px;
    font-weight: 900;
    color: #FFFFFF;
    text-shadow: 0 0 8px #39FF14;
    line-height: 1.1;
    white-space: nowrap;
  }

  .headline span {
    color: #39FF14;
  }

  .phone {
    font-size: 11px;
    font-weight: 700;
    color: #FF10F0;
    letter-spacing: 0.5px;
    text-shadow: 0 0 6px #FF10F0;
  }

  .cta-btn {
    position: relative;
    z-index: 2;
    background: linear-gradient(135deg, #39FF14, #00ff88);
    color: #0d0020;
    font-size: 10px;
    font-weight: 900;
    padding: 7px 12px;
    border: none;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    white-space: nowrap;
    animation: btnPulse 1.5s ease-in-out infinite;
    text-decoration: none;
    display: block;
  }

  @keyframes btnPulse {
    0%   { box-shadow: 0 0 6px #39FF14, 0 0 14px #39FF14aa; }
    50%  { box-shadow: 0 0 12px #39FF14, 0 0 28px #39FF14cc; }
    100% { box-shadow: 0 0 6px #39FF14, 0 0 14px #39FF14aa; }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="text-block">
    <div class="headline">Struggling with <span>payments?</span></div>
    <div class="phone">📞 (855) 204-4447</div>
  </div>
  <a class="cta-btn">GET HELP NOW</a>
</div>
</body>
</html>
