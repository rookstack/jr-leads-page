<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>QSS Banner 320x50</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 320px; height: 50px; overflow: hidden; }
    .banner { width: 320px; height: 50px; display: flex; flex-direction: column; overflow: hidden; }
    .banner-body {
      height: 35px; background: #1a3a5c;
      display: flex; align-items: center; padding: 0 10px; gap: 8px;
    }
    .b-brand { font-family: 'Playfair Display', serif; font-size: 10px; color: #c9944a; letter-spacing: 0.03em; white-space: nowrap; flex-shrink: 0; }
    .b-sep { color: rgba(201,148,74,0.35); font-size: 9px; flex-shrink: 0; }
    .b-headline { font-family: 'Lato', sans-serif; font-size: 9.5px; color: #f5f0e8; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .b-cta { background: #c9944a; color: #1a3a5c; font-family: 'Lato', sans-serif; font-size: 7.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; }
    .compliance {
      background: #0a1929; border-top: 1px solid rgba(201,148,74,0.15);
      height: 15px; display: flex; align-items: center; padding: 0 6px; gap: 4px;
    }
    .compliance svg { height: 10px; width: auto; display: block; flex-shrink: 0; }
    .legal { font-family: 'Lato', sans-serif; font-size: 7px; color: rgba(180,190,200,0.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
<div class="banner">
  <div class="banner-body">
    <div class="b-brand">Quick Short Sales</div>
    <div class="b-sep">|</div>
    <div class="b-headline">Sell fast. No fees. Cash offer.</div>
    <div class="b-cta">Call Now</div>
  </div>
  <div class="compliance">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" aria-label="Equal Housing Opportunity">
      <path d="M10 2L2 9h2v8h4v-5h4v5h4V9h2L10 2z" fill="none" stroke="rgba(180,190,200,0.55)" stroke-width="1.4" stroke-linejoin="round"/>
      <line x1="6" y1="13" x2="14" y2="13" stroke="rgba(180,190,200,0.55)" stroke-width="1.2"/>
      <line x1="6" y1="15.5" x2="14" y2="15.5" stroke="rgba(180,190,200,0.55)" stroke-width="1.2"/>
    </svg>
    <div class="legal">Jack Watlington PA dba Fidelity Realty Advisors &nbsp;|&nbsp; FL Lic. #3139881</div>
  </div>
</div>
</body>
</html>
