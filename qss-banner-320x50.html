<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSS Mobile Banner 320x50</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 320px;
    height: 50px;
    overflow: hidden;
    background: transparent;
  }
  a.banner {
    display: flex;
    align-items: center;
    width: 320px;
    height: 50px;
    background: linear-gradient(105deg, #1a3a5c 0%, #0f2540 100%);
    border-left: 4px solid #c9944a;
    text-decoration: none;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    gap: 0;
  }
  .brand {
    flex: 0 0 auto;
    padding: 0 10px 0 9px;
    display: flex;
    align-items: center;
    border-right: 1px solid rgba(201,148,74,0.3);
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 11px;
    color: #e6c76a;
    white-space: nowrap;
    letter-spacing: 0.2px;
    line-height: 1;
  }
  .headline {
    flex: 1;
    padding: 0 10px;
    display: flex;
    align-items: center;
  }
  .headline-text {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: #f5f0e8;
    line-height: 1.2;
    white-space: nowrap;
  }
  .headline-text em {
    font-style: normal;
    color: #e6c76a;
  }
  .cta-wrap {
    flex: 0 0 auto;
    padding: 0 10px;
  }
  .cta-btn {
    display: inline-block;
    background: linear-gradient(135deg, #c9944a, #e6c76a);
    color: #1a3a5c;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 9px;
    border-radius: 2px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="brand">
    <div class="brand-name">QSS</div>
  </div>
  <div class="headline">
    <div class="headline-text">Owe more than it's worth? <em>We can help.</em></div>
  </div>
  <div class="cta-wrap">
    <div class="cta-btn">Get Help</div>
  </div>
</a>
</body>
</html>
