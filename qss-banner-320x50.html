<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QSS Mobile Banner 320x50 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 320px;
    height: 50px;
    overflow: hidden;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a.banner {
    display: flex;
    align-items: center;
    width: 320px;
    height: 50px;
    background: #0D1B2A;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  /* Orange left bar — hard identity anchor */
  a.banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: #FF5F1F;
    z-index: 10;
  }

  /* Diagonal stripe — right side */
  .bg-texture {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 120px;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 6px,
      rgba(255,95,31,0.05) 6px,
      rgba(255,95,31,0.05) 8px
    );
    pointer-events: none;
  }

  /* Headline zone */
  .headline {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 10px 0 14px;
    position: relative;
    z-index: 2;
  }
  .headline-main {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 17px;
    color: #FFFFFF;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .headline-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 9px;
    color: #FF5F1F;
    line-height: 1;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* CTA */
  .cta-wrap {
    flex: 0 0 auto;
    padding: 0 10px;
    position: relative;
    z-index: 2;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: #FF5F1F;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 10px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 8px 11px;
    border-radius: 3px;
    white-space: nowrap;
    box-shadow: 0 0 12px rgba(255,95,31,0.5);
  }
</style>
</head>
<body>
<a class="banner" href="https://quickshortsales.net" target="_blank">
  <div class="bg-texture"></div>
  <div class="headline">
    <div class="headline-main">Struggling with payments?</div>
    <div class="headline-sub">You have options — Short Sale Specialists</div>
  </div>
  <div class="cta-wrap">
    <div class="cta-btn">Get Help →</div>
  </div>
</a>
</body>
</html>
